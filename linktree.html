<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DaintyDust - Links</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/linktree.css" />
    <script src="/assets/js/redirect.js"></script>
    <script src="/assets/js/linktree.js"></script>
    <script src="/assets/js/pixelbackground.js"></script>
  </head>
  <body>
    <div class="canvas-container">
      <canvas class="main-canvas" id="main-canvas"></canvas>
    </div>

    <a href="/" class="nav-back">← Back</a>

    <div class="page-content">
      <h1 class="page-title">Social Links</h1>
      <div class="linktree-links">
        <a href="/youtube" class="linktree-link" target="_blank">
          <img src="/assets/images/Youtube_Logo.png" alt="YouTube" />
          <span>YouTube</span>
        </a>
        <a href="/github" class="linktree-link" target="_blank">
          <img src="/assets/images/Github_Logo.png" alt="GitHub" />
          <span>GitHub</span>
        </a>
        <a href="#" class="linktree-link discord-link">
          <img src="/assets/images/Discord_Logo.png" alt="Discord" />
          <span>Discord</span>
        </a>
        <a href="/twitter" class="linktree-link" target="_blank">
          <img src="/assets/images/Twitter_Logo.png" alt="Twitter" />
          <span>Twitter</span>
        </a>
        <a href="/twitch" class="linktree-link" target="_blank">
          <img src="/assets/images/Twitch_Logo.png" alt="Twitch" />
          <span>Twitch</span>
        </a>
        <a href="robloxaccounts" class="linktree-link">
          <img src="/assets/images/Roblox_Logo.png" alt="Roblox" />
          <span>Roblox Accounts</span>
        </a>
        <a href="/group" class="linktree-link" target="_blank">
          <img src="/assets/images/Nick_Studios_Logo.png" alt="Nick Studios" />
          <span>Nick Studios Group</span>
        </a>
      </div>
    </div>

    <div class="discord-popup">
      <div class="discord-popup-content">
        <h3>Discord Username</h3>
        <div class="discord-username">DaintyDust</div>
        <div class="popup-buttons">
          <button class="popup-btn copy-btn">Copy</button>
          <button class="popup-btn close-popup">Close</button>
        </div>
      </div>
    </div>
  </body>
</html>
