<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DaintyDust</title>
    <link rel="icon" href="assets/images/Profile Circle.png" type="image/jpg" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
      .section {
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .section-content {
        max-width: 800px;
        margin: 0 auto;
        width: -webkit-fill-available;
      }
    </style>
  </head>
  <body>
    <script src="assets/redirect.js"></script>
    <section id="linktree" class="section">
      <div class="section-content">
        <img src="assets/images/Profile Circle.png" alt="Profile Circle" class="profile-circle" />
        <h1 class="linktree-title">DaintyDust</h1>
        <div class="linktree-links">
          <a href="/Youtube" class="linktree-link">
            <img src="assets/images/Youtube Logo.png" alt="YouTube" class="linktree-icon" />
            YouTube
          </a>
          <a href="/github" class="linktree-link">
            <img src="assets/images/Github Logo.png" alt="GitHub" class="linktree-icon" />
            GitHub
          </a>
          <a href="#" class="linktree-link" id="discord-link">
            <img src="assets/images/Discord Logo.png" alt="Discord" class="linktree-icon" />
            Discord
          </a>
          <a href="/twitter" class="linktree-link">
            <img src="assets/images/Twitter Logo.png" alt="Twitter" class="linktree-icon" />
            Twitter
          </a>
          <a href="/twitch" class="linktree-link">
            <img src="assets/images/Twitch Logo.png" alt="Twitch" class="linktree-icon" />
            Twitch
          </a>
          <a href="/roblox" class="linktree-link">
            <img src="assets/images/Roblox Logo.png" alt="Roblox" class="linktree-icon" />
            Roblox
          </a>
          <a href="/nick-studios" class="linktree-link">
            <img src="assets/images/Nick Studios Logo.png" alt="Nick Studios" class="linktree-icon" />
            Nick Studios Group
          </a>
        </div>
      </div>
    </section>
    <script src="assets/linktree.js"></script>
  </body>
</html>
